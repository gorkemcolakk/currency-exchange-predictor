<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<script>
    (function() {
        const theme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', theme);
        const lang = localStorage.getItem('lang') || 'tr';
        document.documentElement.setAttribute('lang', lang);
    })();
</script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim | GOBA INVEST</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .form-group {
            margin-bottom: 2rem;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .form-control {
            width: 100%;
            padding: 1rem;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: inherit;
            transition: var(--transition);
        }
        .form-control:focus {
            outline: none;
            border-color: var(--accent-secondary);
            background: rgba(255, 255, 255, 0.08);
        }
        textarea.form-control {
            min-height: 150px;
            resize: vertical;
        }
    </style>
</head>
<body>
    <header>
        <div class="container nav-container">
            <a href="/" class="nav-logo">
                <div class="logo-symbol"><i class="fa-solid fa-chart-line"></i></div>
                <span class="logo-text">GOBA<span>INVEST</span></span>
            </a>
            <nav style="display: flex; align-items: center;">
                <a href="/" data-i18n="nav_home"><i class="fa-solid fa-house"></i> Anasayfa</a>
                <a href="/news" data-i18n="nav_news"><i class="fa-solid fa-newspaper"></i> Haberler</a>
                <a href="/contact" class="nav-active" data-i18n="nav_contact" style="color: var(--accent-secondary);"><i class="fa-solid fa-envelope"></i> İletişim</a>
                <div class="lang-switch" id="lang-toggle">
                    <i class="fa-solid fa-globe"></i>
                    <span id="lang-text">TR</span>
                </div>
                <div class="theme-switch" id="theme-toggle" title="Tema Değiştir">
                    <i class="fa-solid fa-sun"></i>
                    <i class="fa-solid fa-moon"></i>
                </div>
                <div class="clock-display" id="live-clock">
                    <i class="fa-regular fa-clock"></i>
                    <span>00:00:00</span>
                </div>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="hero" style="padding-bottom: 2rem;">
            <h1 data-i18n="contact_title">Bize Ulaşın</h1>
            <p data-i18n="contact_subtitle">Finansal analizlerimiz veya platformumuz hakkında sorularınız mı var? Ekibimiz her zaman yardıma hazır.</p>
        </section>

        <div style="max-width: 800px; margin: 0 auto;">
            <div class="glass-card" style="padding: 3rem;">
                <form action="/contact" method="post">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                        <div class="form-group">
                            <label data-i18n="label_name">Ad Soyad</label>
                            <input type="text" name="name" class="form-control" placeholder="Adınız Soyadınız" data-i18n-placeholder="placeholder_name" required>
                        </div>
                        <div class="form-group">
                            <label data-i18n="label_email">E-posta Adresi</label>
                            <input type="email" name="email" class="form-control" placeholder="example@email.com" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label data-i18n="label_subject">Konu</label>
                        <input type="text" name="subject" class="form-control" placeholder="Hangi konuda yazıyorsunuz?" data-i18n-placeholder="placeholder_subject" required>
                    </div>

                    <div class="form-group">
                        <label data-i18n="label_message">Mesajınız</label>
                        <textarea name="message" class="form-control" placeholder="Bize bir not bırakın..." data-i18n-placeholder="placeholder_message" required></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%;" data-i18n="btn_send">Mesajı Gönder</button>
                    
                    <div style="margin-top: 2rem; display: flex; justify-content: center; gap: 40px; color: var(--text-secondary); font-size: 0.9rem;">
                        <span data-i18n="contact_phone"><i class="fa-solid fa-phone" style="margin-right: 8px;"></i> +90 (212) 555 45 45</span>
                        <span data-i18n="contact_address"><i class="fa-solid fa-location-dot" style="margin-right: 8px;"></i> Maslak, İstanbul</span>
                    </div>
                </form>
            </div>
        </div>
        <div style="text-align: center; margin-top: 4rem;">
            <a href="/" data-i18n="back_to_home" class="btn btn-primary">Anasayfaya Dön</a>
        </div>
    </main>

    <footer>
        <p data-i18n="footer_text">&copy; 2024 GOBA INVEST. Tüm Hakları Saklıdır.</p>
    </footer>
    <script>
        // Theme Toggle Logic
        const themeToggle = document.getElementById('theme-toggle');
        const html = document.documentElement;
        // Language Logic
        const translations = {
            'tr': {
                'nav_home': '<i class="fa-solid fa-house"></i> Anasayfa',
                'nav_news': '<i class="fa-solid fa-newspaper"></i> Haberler',
                'nav_contact': '<i class="fa-solid fa-envelope"></i> İletişim',
                'contact_title': 'Bize Ulaşın',
                'contact_subtitle': 'Finansal analizlerimiz veya platformumuz hakkında sorularınız mı var? Ekibimiz her zaman yardıma hazır.',
                'label_name': 'Ad Soyad', 'label_email': 'E-posta Adresi', 'label_subject': 'Konu', 'label_message': 'Mesajınız',
                'placeholder_name': 'Adınız Soyadınız', 'placeholder_subject': 'Hangi konuda yazıyorsunuz?', 'placeholder_message': 'Bize bir not bırakın...',
                'btn_send': 'Mesajı Gönder',
                'back_to_home': 'Anasayfaya Dön',
                'footer_text': '&copy; 2024 GOBA INVEST. Tüm Hakları Saklıdır.',
                'contact_phone': '<i class="fa-solid fa-phone" style="margin-right: 8px;"></i> +90 (212) 555 45 45',
                'contact_address': '<i class="fa-solid fa-location-dot" style="margin-right: 8px;"></i> Maslak, İstanbul'
            },
            'en': {
                'nav_home': '<i class="fa-solid fa-house"></i> Home',
                'nav_news': '<i class="fa-solid fa-newspaper"></i> News',
                'nav_contact': '<i class="fa-solid fa-envelope"></i> Contact',
                'contact_title': 'Contact Us',
                'contact_subtitle': 'Do you have questions about our financial analysis or platform? Our team is always ready to help.',
                'label_name': 'Full Name', 'label_email': 'Email Address', 'label_subject': 'Subject', 'label_message': 'Your Message',
                'placeholder_name': 'Your full name', 'placeholder_subject': 'What are you writing about?', 'placeholder_message': 'Leave us a note...',
                'btn_send': 'Send Message',
                'back_to_home': 'Back to Home',
                'footer_text': '&copy; 2024 GOBA INVEST. All Rights Reserved.',
                'contact_phone': '<i class="fa-solid fa-phone" style="margin-right: 8px;"></i> +90 (212) 555 45 45',
                'contact_address': '<i class="fa-solid fa-location-dot" style="margin-right: 8px;"></i> Maslak, Istanbul'
            }
        };

        const langToggle = document.getElementById('lang-toggle');
        const langText = document.getElementById('lang-text');

        function updateLanguage(lang) {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) el.innerHTML = translations[lang][key];
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (translations[lang][key]) el.setAttribute('placeholder', translations[lang][key]);
            });
            langText.innerText = lang.toUpperCase();
            localStorage.setItem('lang', lang);
            html.setAttribute('lang', lang);
        }
        langToggle.addEventListener('click', () => {
            const currentLang = html.getAttribute('lang') || 'tr';
            updateLanguage(currentLang === 'tr' ? 'en' : 'tr');
        });

        themeToggle.addEventListener('click', () => {
            console.log("Theme click detected");
            const currentTheme = html.getAttribute('data-theme') || 'dark';
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            console.log("Switching theme to:", newTheme);
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });

        const savedLang = localStorage.getItem('lang') || 'tr';
        updateLanguage(savedLang);
        console.log("Contact Page Ready - Current Lang:", savedLang);

        // Live Clock logic
        function updateClock() {
            const clockEl = document.querySelector('#live-clock span');
            if (clockEl) {
                const now = new Date();
                clockEl.textContent = now.toLocaleTimeString('tr-TR', { hour12: false });
            }
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
