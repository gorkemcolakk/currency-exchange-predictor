<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim | GOBA INVEST</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .form-group {
            margin-bottom: 2rem;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .form-control {
            width: 100%;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            transition: var(--transition);
        }
        .form-control:focus {
            outline: none;
            border-color: var(--accent-secondary);
            background: rgba(255, 255, 255, 0.08);
        }
        textarea.form-control {
            min-height: 150px;
            resize: vertical;
        }
    </style>
</head>
<body>
    <header>
        <div class="container nav-container">
            <a href="/" class="nav-logo">
                <div class="logo-symbol"><i class="fa-solid fa-chart-line"></i></div>
                <span class="logo-text">GOBA<span>INVEST</span></span>
            </a>
            <nav style="display: flex; align-items: center;">
                <a href="/"><i class="fa-solid fa-house"></i> Anasayfa</a>
                <a href="/news"><i class="fa-solid fa-newspaper"></i> Haberler</a>
                <a href="/contact" style="color: white;"><i class="fa-solid fa-envelope"></i> İletişim</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="hero" style="padding-bottom: 2rem;">
            <h1>Bize Ulaşın</h1>
            <p>Finansal analizlerimiz veya platformumuz hakkında sorularınız mı var? Ekibimiz her zaman yardıma hazır.</p>
        </section>

        <div style="max-width: 800px; margin: 0 auto;">
            <div class="glass-card" style="padding: 3rem;">
                <form action="/contact" method="post">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                        <div class="form-group">
                            <label>Ad Soyad</label>
                            <input type="text" name="name" class="form-control" placeholder="Adınız Soyadınız" required>
                        </div>
                        <div class="form-group">
                            <label>E-posta Adresi</label>
                            <input type="email" name="email" class="form-control" placeholder="example@email.com" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Konu</label>
                        <input type="text" name="subject" class="form-control" placeholder="Hangi konuda yazıyorsunuz?" required>
                    </div>

                    <div class="form-group">
                        <label>Mesajınız</label>
                        <textarea name="message" class="form-control" placeholder="Bize bir not bırakın..." required></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%;">Mesajı Gönder</button>
                    
                    <div style="margin-top: 2rem; display: flex; justify-content: center; gap: 40px; color: var(--text-secondary); font-size: 0.9rem;">
                        <span><i class="fa-solid fa-phone" style="margin-right: 8px;"></i> +90 (212) 555 45 45</span>
                        <span><i class="fa-solid fa-location-dot" style="margin-right: 8px;"></i> Maslak, İstanbul</span>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 GOBA INVEST. Tüm Hakları Saklıdır.</p>
    </footer>
</body>
</html>
